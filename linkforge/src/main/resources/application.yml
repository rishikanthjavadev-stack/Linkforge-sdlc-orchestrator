server:
  port: 8080

spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:h2:file:./data/urlshortener;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# Application-specific config (Phase 1 defaults; will be reasoned about
# again in Phase 2/3 brownfield scenario: adding rate limiting)
app:
  shortener:
    base-url: http://localhost:8080
    default-expiry-days: 365
    code-min-length: 6
